[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_glob = ["venv", ".venv", "__pycache__", "*.pyc"]
force_sort_within_sections = true
order_by_type = true

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
exclude = 'venv/|\.venv/|__pycache__/'
disable_error_code = "call-overload,assignment,attr-defined"
follow_imports = "skip"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["."]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_default_fixture_loop_scope = "function"